concurrent = 4

[[runners]]
name = "cpu-runner"
executor = "docker"
run_untagged = true

[runners.docker]
image = "docker:29"
volumes = ["/var/run/docker.sock:/var/run/docker.sock"]
pull_policy = ["if-not-present"]

[[runners]]
name = "gpu-runner"
executor = "docker"
tag_list = ["gpu"]
run_untagged = false
limit = 1

[runners.docker]
image = "docker:29"
volumes = ["/var/run/docker.sock:/var/run/docker.sock"]
pull_policy = ["if-not-present"]
runtime = "nvidia"
gpus = "all"
