[build-system]
requires = [
    "setuptools",
    "wheel"
]
build-backend = "setuptools.build_meta"

[project]
dynamic = [
    "version",
]

name = "myinfra"
license = "Apache-2.0"

requires-python = ">=3.11,<3.13"
dependencies = [
    "bitwarden-sdk",
    "cloudflare",
    "pyinfra",
    "requests",
]

[tool.setuptools]
include-package-data = true
package-dir = {"" = "src"}
license-files = ["LICENSE"]

[tool.setuptools.dynamic]
version = { attr = "myinfra.__init__.__version__" }

[tool.setuptools.packages.find]
where = ["src"]
