[build-system]
requires = [
    "setuptools",
    "wheel"
]
build-backend = "setuptools.build_meta"

[project]
dynamic = [
    "version",
]

name = "xfiles"
license = "Apache-2.0"
license-files = ["LICENSE"]

requires-python = ">=3.11,<3.13"
dependencies = [
    "tqdm",
]

[project.optional-dependencies]
aim = ["aim"]
mlflow = ["mlflow"]

[tool.setuptools]
include-package-data = true
package-dir = {"" = "src"}

[tool.setuptools.dynamic]
version = { attr = "xfiles.__init__.__version__" }

[tool.setuptools.packages.find]
where = ["src"]
